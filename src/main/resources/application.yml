server:
  port: 8080

spring:
  application:
    name: integration-hub-api

  datasource:
    url: jdbc:postgresql://localhost:5432/integrationhub
    username: ${POSTGRES_USER:integrationhub}
    password: ${POSTGRES_PASSWORD:integrationhub}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    user:
      name: admin
      password: admin-secret
      roles: ADMIN

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-}] %5p --- [%15.15t] %-40.40logger{39} : %m%n"
